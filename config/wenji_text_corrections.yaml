# 《文集》引文检索正文修订映射
#
# 作用：在 build_index.py 抽取 PDF 文本后、归一化前，对 raw_text 做定向修订，修正
# PDF 隐藏 OCR 文本层的缺陷（形近错别字、字母代替标点/汉字、误识数字等），使
# 引文检索 的 normalized_text 与 PDF 原文对应、提升召回。
#
# 重要安全说明：
#   - 修订只影响“检索匹配 / 引文摘要片段”，不影响阅读器实时渲染的 PDF 图片，
#     即用户屏幕所见的书页内容不受影响。
#   - 三类条目：
#       book_wide   —— 对每个《文集》页应用；仅放 never-valid（永不构成合法词）的串。
#       volume_wide —— 对指定卷每页应用；仅放在该卷范围内 never-valid 的串。
#       pages       —— 页锚定（volume+page），带 occ 校验：find 须在该页恰好命中 occ 次，
#                      否则只告警跳过、绝不误改。
#   - 仅 conf: high 的条目会被应用。
#   - 全部条目均经 10 个核对 agent 渲染 PDF 扫描页核对、并尽量与公开权威资料
#     （marxists.org 中文马克思主义文库 / 中国社科院马研网 / 人民出版社《文集》）交叉印证。
#   - 本文件只动《文集》，对 全集 / 列宁全集 零影响。
#
# 注：大量“孤立拉丁字母代替标点（尤其 z=冒号、s/g/E/F=逗号/句号）”由 build_index.py
#     的 OCR 标点清理在构建期自动移除，无需在此逐条列出。此处只收录清理无法覆盖的
#     形近错别字、字母代替汉字/数字等需“替换”的高置信修订。

# —— 文集级（never-valid，全卷安全替换）——
book_wide:
  - find: "f卑斯"            # OCR 把“俾”的单人旁误拆为孤立 f：f卑斯麦 → 俾斯麦(Bismarck)
    replace: "俾斯"
    conf: high
    evidence: "Bismarck 标准译名俾斯麦；'f卑斯'永不构成合法词；分布于第1/2/3/4/9/10卷共约164处，已核对无合法搭配。"
  - find: "瑛鼎查"           # Henry Pottinger 标准译名璞鼎查；瑛鼎查为形近误识
    replace: "璞鼎查"
    conf: high
    evidence: "第2卷 p852 人名索引原文'璞鼎查，亨利(Pottinger, Henry 1789—1856)'；'瑛鼎查'永不构成合法词。"
  - find: "租f田"            # 分成租佃制：OCR 把“佃”误识为'f田'
    replace: "租佃"
    conf: high
    evidence: "第10卷 p400/p561'分成租佃制(métayage)'；'租f田'含孤立 f，永不构成合法词。"
  - find: "握蜒"             # 龌龊：生僻词形近误识（龌龊→握蜒）
    replace: "龌龊"
    conf: high
    evidence: "全《文集》'龌龊'出现0次、'握蜒'出现4次(卑鄙龌龊×3/最龌龊的×1，v1p460/v2p80/v2p117/v3p480)，'握蜒'永不构成合法词。"

# —— 卷级（在该卷范围内 never-valid）——
volume_wide:
  6:
    - find: "商晶"           # 商品：OCR 把“品”误识为“晶”
      replace: "商品"
      conf: high
      evidence: "第6卷《资本论》第二卷共147处'商晶'，全卷无'通商晶/形成晶'等合法搭配（已核 0 例），渲染 p24 序言确认'商品'。"
    - find: "成晶"           # 成品：同类“品→晶”误识
      replace: "成品"
      conf: high
      evidence: "第6卷共19处'成晶'(成品/半成品)，全《文集》无'形成晶/成晶体'等合法搭配（已核 0 例），渲染 p411 确认'成品'。"
    - find: "货市"           # 货币：OCR 把“币”误识为“市”
      replace: "货币"
      conf: high
      evidence: "第6卷 5处'货市'(货市资本/货市经济)均应为货币，全卷无'货市场'等合法搭配（已核 0 例），渲染 p73 章题'货币资本的循环'确认。"

