<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>{{ title }} - 会员中心</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --card: #fffdf9;
      --line: #decfbd;
      --text: #231d17;
      --muted: #72675d;
      --accent: #8f1d1d;
      --accent-deep: #651313;
      --soft: #f5e2dc;
      --warn: #8a5b00;
      --warn-bg: #fff4d6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
      background: linear-gradient(180deg, #f7f3ed 0%, #efe7db 100%);
    }
    .wrap { max-width: 560px; margin: 48px auto; padding: 0 16px 40px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 16px 40px rgba(64, 44, 27, 0.08);
    }
    h1 { margin: 0 0 8px; font-size: 1.9rem; }
    .muted { margin: 0 0 18px; color: var(--muted); line-height: 1.8; }
    .error {
      border-radius: 14px;
      padding: 12px 14px;
      line-height: 1.7;
      margin-bottom: 12px;
      color: var(--warn);
      background: var(--warn-bg);
      border: 1px solid rgba(138, 91, 0, 0.16);
    }
    form { display: grid; gap: 14px; }
    label { display: grid; gap: 8px; font-weight: 700; }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      background: #fffdfa;
    }
    input:focus {
      outline: none;
      border-color: #b03838;
      box-shadow: 0 0 0 4px rgba(176, 56, 56, 0.08);
    }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 6px; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: 999px;
      padding: 11px 18px;
      font: inherit;
      cursor: pointer;
      border: 1px solid transparent;
    }
    .primary { color: white; background: var(--accent); }
    .primary:hover { background: var(--accent-deep); }
    .secondary { color: var(--accent); border-color: var(--accent); background: white; }
    .secondary:hover { background: var(--soft); }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>{{ title }}</h1>
      <p class="muted">请设置一个新密码。</p>

      {% for item in errors %}
      <div class="error">{{ item }}</div>
      {% endfor %}

      {% if valid %}
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <label>
          新密码
          <input type="password" name="password" autocomplete="new-password" required>
        </label>
        <label>
          确认新密码
          <input type="password" name="confirm_password" autocomplete="new-password" required>
        </label>
        <div class="actions">
          <button class="btn primary" type="submit">重置密码</button>
          <a class="btn secondary" href="{{ url_for('login') }}">返回登录</a>
        </div>
      </form>
      {% else %}
      <div class="actions">
        <a class="btn primary" href="{{ url_for('forgot_password') }}">重新申请</a>
        <a class="btn secondary" href="{{ url_for('login') }}">返回登录</a>
      </div>
      {% endif %}
    </section>
  </div>
</body>
</html>
